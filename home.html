<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box {
      border: 1px solid #00ffcc;
      padding: 25px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 20px #00ffcc33;
    }

    .wallet {
      font-size: 11px;
      margin-bottom: 10px;
      color: #aaa;
      word-break: break-all;
    }

    .points {
      font-size: 28px;
      margin: 15px 0;
    }

    button {
      padding: 12px;
      width: 100%;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>DASHBOARD</h1>

  <div class="wallet" id="wallet"></div>

  <div class="points" id="points">Points: 0</div>

  <button id="claimBtn" onclick="claimPoints()">Claim 10 Points</button>

  <div id="status"></div>
</div>

<script>
let wallet = localStorage.getItem("wallet");

// Agar wallet nahi hai → wapas login page
if (!wallet) {
  window.location.href = "index.html";
}

document.getElementById("wallet").innerText =
  "Wallet: " + wallet;

let points = localStorage.getItem("points") || 0;
let lastClaim = localStorage.getItem("lastClaim");

document.getElementById("points").innerText = "Points: " + points;

function getResetTime() {
  let reset = new Date();
  reset.setHours(5);
  reset.setMinutes(45);
  reset.setSeconds(0);

  if (new Date() > reset) {
    reset.setDate(reset.getDate() + 1);
  }

  return reset;
}

function canClaim() {
  if (!lastClaim) return true;

  return new Date(parseInt(lastClaim)) < getResetTime();
}

function updateBtn() {
  if (!canClaim()) {
    document.getElementById("claimBtn").disabled = true;
    document.getElementById("status").innerText =
      "Come back after 5:45 AM";
  }
}

function claimPoints() {
  if (!canClaim()) return;

  points = parseInt(points) + 10;

  localStorage.setItem("points", points);
  localStorage.setItem("lastClaim", Date.now());

  document.getElementById("points").innerText = "Points: " + points;
  document.getElementById("status").innerText = "Claimed ✅";

  updateBtn();
}

updateBtn();
</script>

</body>
</html>
