<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      min-height:100vh;
      padding-bottom:90px;
    }

    .page{
      min-height:80vh;
      padding:20px;
    }

    .hidden{
      display:none;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#111;
      border-top:1px solid #2a2a2a;
      display:flex;
      justify-content:space-around;
      padding:12px 5px;
    }

    .nav-btn{
      flex:1;
      text-align:center;
      color:#ffc107;
      font-size:13px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<!-- Tournament -->
<div id="tournament" class="page"></div>

<!-- Battle Royal -->
<div id="battle" class="page hidden"></div>

<!-- Wallet -->
<div id="wallet" class="page hidden"></div>

<!-- Refer -->
<div id="refer" class="page hidden"></div>

<!-- Profile -->
<div id="profile" class="page hidden"></div>

<!-- Bottom Navigation -->
<div class="bottom-nav">

  <div class="nav-btn"
       onclick="showPage('tournament')">
    🏆
  </div>

  <div class="nav-btn"
       onclick="showPage('battle')">
    ⚔️
  </div>

  <div class="nav-btn"
       onclick="showPage('wallet')">
    💰
  </div>

  <div class="nav-btn"
       onclick="showPage('refer')">
    🎁
  </div>

  <div class="nav-btn"
       onclick="showPage('profile')">
    👤
  </div>

</div>

<script>

function showPage(pageId){

  let pages =
    document.querySelectorAll(".page");

  pages.forEach(page => {
    page.classList.add("hidden");
  });

  document.getElementById(pageId)
    .classList.remove("hidden");
}

</script>

</body>
</html>
