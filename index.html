<!DOCTYPE html>
<html>
<head>
  <title>PUBG Tournament Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0b0b0b;
      color:#fff;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:400px;
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:30px;
      box-shadow:0 0 25px rgba(255,193,7,0.08);
    }

    h1{
      text-align:center;
      color:#ffc107;
      margin-bottom:8px;
    }

    .sub{
      text-align:center;
      color:#bbb;
      font-size:14px;
      margin-bottom:22px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      outline:none;
      font-size:14px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      font-size:15px;
      cursor:pointer;
    }

    .switch{
      text-align:center;
      margin-top:16px;
      font-size:14px;
      color:#aaa;
      cursor:pointer;
    }

    .switch span{
      color:#ffc107;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }

    #status{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:#00ffcc;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- SIGN UP -->
  <div id="signupPage">

    <h1>Create Account</h1>
    <div class="sub">Register for PUBG Tournament Rewards</div>

    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="signupEmail" placeholder="Email Address">
    <input type="text" id="signupOtp" placeholder="Email Verification OTP">
    <input type="password" id="signupPassword" placeholder="Create Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="signup()">Sign Up</button>

    <div class="switch" onclick="showLogin()">
      Already have an account? <span>Login</span>
    </div>

  </div>

  <!-- LOGIN -->
  <div id="loginPage" class="hidden">

    <h1>Welcome Back</h1>
    <div class="sub">Login to continue</div>

    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="text" id="loginOtp" placeholder="Verification OTP">
    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="switch" onclick="showSignup()">
      Don’t have an account? <span>Sign Up</span>
    </div>

  </div>

  <div id="status"></div>

</div>

<script>

/* Already logged in */
if(localStorage.getItem("loggedIn") === "true"){
  window.location.href = "home.html";
}

function showLogin(){
  document.getElementById("signupPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("status").innerText = "";
}

function showSignup(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("signupPage").classList.remove("hidden");
  document.getElementById("status").innerText = "";
}

function signup(){
  let name = document.getElementById("fullName").value;
  let email = document.getElementById("signupEmail").value;
  let otp = document.getElementById("signupOtp").value;
  let pass = document.getElementById("signupPassword").value;
  let confirm = document.getElementById("confirmPassword").value;

  if(!name || !email || !otp || !pass || !confirm){
    document.getElementById("status").innerText =
      "Please fill all fields";
    return;
  }

  if(pass !== confirm){
    document.getElementById("status").innerText =
      "Passwords do not match";
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("userPassword", pass);

  document.getElementById("status").innerText =
    "Account created successfully ✅";

  setTimeout(() => {
    showLogin();
  }, 1000);
}

function login(){
  let email = document.getElementById("loginEmail").value;
  let otp = document.getElementById("loginOtp").value;
  let pass = document.getElementById("loginPassword").value;

  let savedEmail = localStorage.getItem("userEmail");
  let savedPass = localStorage.getItem("userPassword");

  if(email === savedEmail && pass === savedPass && otp){
    localStorage.setItem("loggedIn", "true");

    document.getElementById("status").innerText =
      "Login successful ✅";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);

  } else {
    document.getElementById("status").innerText =
      "Invalid login details";
  }
}

</script>

</body>
</html>
