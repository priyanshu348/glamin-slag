<!DOCTYPE html>
<html>
<head>
  <title>PUBG Tournament Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:400px;
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:30px;
      text-align:center;
    }

    h1{
      color:#ffc107;
      margin-bottom:10px;
    }

    .sub{
      color:#bbb;
      margin-bottom:20px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      outline:none;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    #status{
      margin-top:15px;
      font-size:13px;
      color:#00ffcc;
    }
  </style>
</head>
<body>

<div class="box">

  <h1>Phone OTP Login</h1>
  <div class="sub">
    PUBG Tournament Secure Access
  </div>

  <input
    type="text"
    id="phone"
    placeholder="+91 Enter Mobile Number"
  >

  <button onclick="sendOtp()">
    Get OTP
  </button>

  <div id="recaptcha-container"></div>

  <input
    type="text"
    id="otp"
    placeholder="Enter OTP"
  >

  <button onclick="verifyOtp()">
    Verify OTP
  </button>

  <div id="status"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDLDsZlB0kdA6oZjIyAzEkJzKIngWKG6ac",
  authDomain: "lamin-slag.firebaseapp.com",
  projectId: "lamin-slag",
  storageBucket: "lamin-slag.firebasestorage.app",
  messagingSenderId: "522509507532",
  appId: "1:522509507532:web:f84ed596f1f2b5c4291b69",
  measurementId: "G-JP2V56Q0KZ"
};

firebase.initializeApp(firebaseConfig);

window.onload = function () {
  window.recaptchaVerifier =
    new firebase.auth.RecaptchaVerifier(
      'recaptcha-container',
      {
        size: 'normal',
        callback: function(response) {}
      }
    );
};

function sendOtp() {
  const phone =
    document.getElementById("phone").value;

  firebase.auth().signInWithPhoneNumber(
    phone,
    window.recaptchaVerifier
  )
  .then(function (confirmationResult) {

    window.confirmationResult =
      confirmationResult;

    document.getElementById("status").innerText =
      "OTP Sent Successfully ✅";

  })
  .catch(function (error) {

    document.getElementById("status").innerText =
      "OTP Send Failed ❌";

  });
}

function verifyOtp() {
  const code =
    document.getElementById("otp").value;

  confirmationResult.confirm(code)
  .then(function (result) {

    localStorage.setItem("loggedIn", "true");

    document.getElementById("status").innerText =
      "Login Successful ✅";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);

  })
  .catch(function () {

    document.getElementById("status").innerText =
      "Wrong OTP ❌";

  });
}

</script>

</body>
</html>
