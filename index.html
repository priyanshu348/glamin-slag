<!DOCTYPE html>
<html>
<head>
  <title>PUBG Tournament Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:400px;
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:30px;
      text-align:center;
      box-shadow:0 0 20px rgba(255,193,7,0.08);
    }

    h1{
      color:#ffc107;
      margin-bottom:10px;
    }

    .sub{
      color:#bbb;
      margin-bottom:20px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      outline:none;
    }

    .row{
      display:flex;
      gap:10px;
    }

    .row input{
      flex:1;
    }

    .otp-btn{
      width:130px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    #status{
      margin-top:15px;
      color:#00ffcc;
      font-size:13px;
    }
  </style>
</head>
<body>

<div class="box">

  <h1>Create Account</h1>
  <div class="sub">
    PUBG Tournament Secure Access
  </div>

  <input
    type="text"
    id="name"
    placeholder="Full Name"
  >

  <div class="row">
    <input
      type="email"
      id="email"
      placeholder="Email Address"
    >

    <button
      class="otp-btn"
      id="otpBtn"
      onclick="sendOtp()"
    >
      Get OTP
    </button>
  </div>

  <input
    type="text"
    id="otp"
    placeholder="Enter OTP"
  >

  <input
    type="password"
    id="password"
    placeholder="Create Password"
  >

  <button onclick="signup()">
    Sign Up
  </button>

  <div id="status"></div>

</div>

<script>

let generatedOtp = "";

function sendOtp(){
  let email =
    document.getElementById("email").value;

  let otpBtn =
    document.getElementById("otpBtn");

  if(!email){
    document.getElementById("status").innerText =
      "Please enter email first";
    return;
  }

  generatedOtp =
    Math.floor(
      100000 + Math.random() * 900000
    ).toString();

  document.getElementById("status").innerText =
    "Demo OTP: " + generatedOtp;

  let timeLeft = 60;

  otpBtn.disabled = true;
  otpBtn.innerText = "60s";

  let timer = setInterval(() => {
    timeLeft--;

    otpBtn.innerText =
      timeLeft + "s";

    if(timeLeft <= 0){
      clearInterval(timer);
      otpBtn.disabled = false;
      otpBtn.innerText = "Get OTP";
    }

  }, 1000);
}

function signup(){
  let name =
    document.getElementById("name").value;

  let email =
    document.getElementById("email").value;

  let otp =
    document.getElementById("otp").value;

  let password =
    document.getElementById("password").value;

  if(!name || !email || !otp || !password){
    document.getElementById("status").innerText =
      "Please fill all fields";
    return;
  }

  if(otp !== generatedOtp){
    document.getElementById("status").innerText =
      "Wrong OTP ❌";
    return;
  }

  localStorage.setItem("loggedIn", "true");
  localStorage.setItem("userName", name);

  document.getElementById("status").innerText =
    "Signup Successful ✅";

  setTimeout(() => {
    window.location.href = "home.html";
  }, 1000);
}

</script>

</body>
</html>
