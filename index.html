<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:380px;
      background:#111;
      border:1px solid #2a2a2a;
      border-radius:16px;
      padding:30px;
      box-shadow:0 0 20px rgba(255,255,255,0.05);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      color:#00ffcc;
    }

    input{
      width:100%;
      padding:13px;
      margin-bottom:12px;
      border:none;
      border-radius:10px;
      background:#1b1b1b;
      color:white;
      outline:none;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#00ffcc;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:5px;
    }

    .switch{
      text-align:center;
      margin-top:15px;
      font-size:14px;
      color:#aaa;
      cursor:pointer;
    }

    .switch span{
      color:#00ffcc;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }

    #status{
      margin-top:12px;
      text-align:center;
      font-size:13px;
      color:#00ffcc;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- SIGN UP PAGE -->
  <div id="signupPage">
    <h1>Sign Up</h1>

    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="signupEmail" placeholder="Email ID">
    <input type="text" id="signupOtp" placeholder="OTP">
    <input type="password" id="signupPassword" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="signup()">Sign Up</button>

    <div class="switch" onclick="showLogin()">
      Already have an account? <span>Login</span>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="hidden">
    <h1>Login</h1>

    <input type="email" id="loginEmail" placeholder="Email ID">
    <input type="text" id="loginOtp" placeholder="OTP">
    <input type="password" id="loginPassword" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="switch" onclick="showSignup()">
      Mere pass account nahi hai <span>Sign Up</span>
    </div>
  </div>

  <div id="status"></div>

</div>

<script>
/* Refresh ke baad dobara login na karna pade */
if(localStorage.getItem("loggedIn") === "true"){
  window.location.href = "home.html";
}

function showLogin(){
  document.getElementById("signupPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("status").innerText = "";
}

function showSignup(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("signupPage").classList.remove("hidden");
  document.getElementById("status").innerText = "";
}

function signup(){
  let name = document.getElementById("fullName").value;
  let email = document.getElementById("signupEmail").value;
  let otp = document.getElementById("signupOtp").value;
  let pass = document.getElementById("signupPassword").value;
  let confirm = document.getElementById("confirmPassword").value;

  if(!name || !email || !otp || !pass || !confirm){
    document.getElementById("status").innerText = "Sab fields fill karo";
    return;
  }

  if(pass !== confirm){
    document.getElementById("status").innerText = "Password match nahi hua";
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("userPassword", pass);

  document.getElementById("status").innerText = "Account created successfully ✅";

  setTimeout(() => {
    showLogin();
  }, 1000);
}

function login(){
  let email = document.getElementById("loginEmail").value;
  let otp = document.getElementById("loginOtp").value;
  let pass = document.getElementById("loginPassword").value;

  let savedEmail = localStorage.getItem("userEmail");
  let savedPass = localStorage.getItem("userPassword");

  if(email === savedEmail && pass === savedPass && otp){
    localStorage.setItem("loggedIn", "true");
    document.getElementById("status").innerText = "Login successful ✅";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);
  } else {
    document.getElementById("status").innerText = "Invalid login details";
  }
}
</script>

</body>
</html>
