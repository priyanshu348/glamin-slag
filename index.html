<!DOCTYPE html>
<html>
<head>
  <title>PUBG Tournament Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:400px;
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:30px;
      text-align:center;
    }

    h1{
      color:#ffc107;
      margin-bottom:10px;
    }

    .sub{
      color:#bbb;
      margin-bottom:20px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:12px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      outline:none;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .switch{
      margin-top:15px;
      color:#aaa;
      font-size:14px;
      cursor:pointer;
    }

    .switch span{
      color:#ffc107;
      font-weight:bold;
    }

    .hidden{
      display:none;
    }

    #status{
      margin-top:15px;
      font-size:13px;
      color:#00ffcc;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- SIGN UP -->
  <div id="signupPage">
    <h1>Create Account</h1>
    <div class="sub">
      PUBG Tournament Secure Access
    </div>

    <input
      type="text"
      id="fullName"
      placeholder="Full Name"
    >

    <input
      type="email"
      id="signupEmail"
      placeholder="Email Address"
    >

    <input
      type="password"
      id="signupPassword"
      placeholder="Create Password"
    >

    <button onclick="signup()">
      Sign Up
    </button>

    <div class="switch" onclick="showLogin()">
      Already have an account?
      <span>Login</span>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="loginPage" class="hidden">
    <h1>Welcome Back</h1>
    <div class="sub">
      Login to continue
    </div>

    <input
      type="email"
      id="loginEmail"
      placeholder="Email Address"
    >

    <input
      type="password"
      id="loginPassword"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <div class="switch" onclick="showSignup()">
      Don’t have an account?
      <span>Sign Up</span>
    </div>
  </div>

  <div id="status"></div>

</div>

<script>
const supabaseUrl =
"https://cichvssbzxrxqbxktzsc.supabase.co";

const supabaseKey =
"sb_publishable_T_SsMNjo1oMwQ6wvzaL6IQ_CccQYQQj";

const supabase =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

function showLogin(){
  document.getElementById("signupPage")
    .classList.add("hidden");

  document.getElementById("loginPage")
    .classList.remove("hidden");

  document.getElementById("status")
    .innerText = "";
}

function showSignup(){
  document.getElementById("loginPage")
    .classList.add("hidden");

  document.getElementById("signupPage")
    .classList.remove("hidden");

  document.getElementById("status")
    .innerText = "";
}

async function signup(){
  const email =
    document.getElementById("signupEmail").value;

  const password =
    document.getElementById("signupPassword").value;

  const { error } =
    await supabase.auth.signUp({
      email: email,
      password: password
    });

  if(error){
    document.getElementById("status")
      .innerText = error.message;
  } else {
    document.getElementById("status")
      .innerText =
      "Signup successful ✅ Check email";
  }
}

async function login(){
  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  const { error } =
    await supabase.auth.signInWithPassword({
      email: email,
      password: password
    });

  if(error){
    document.getElementById("status")
      .innerText = error.message;
  } else {
    localStorage.setItem(
      "loggedIn",
      "true"
    );

    document.getElementById("status")
      .innerText =
      "Login successful ✅";

    setTimeout(() => {
      window.location.href =
        "home.html";
    }, 1000);
  }
}
</script>

</body>
</html>
