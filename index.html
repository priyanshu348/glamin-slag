<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Wallet Popup Scripts -->
  <script src="https://unpkg.com/web3modal"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider/dist/umd/index.min.js"></script>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
      padding-top: 100px;
    }

    .box {
      width: 90%;
      max-width: 350px;
      margin: auto;
      border: 1px solid #00ffcc;
      padding: 30px;
      box-shadow: 0 0 20px #00ffcc33;
    }

    button {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      margin-top: 20px;
    }

    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>GLAMIN SLAG</h1>
  <p>Secure Wallet Access</p>

  <button onclick="connectWallet()">
    Connect Wallet
  </button>

  <div id="status"></div>
</div>

<script>
async function connectWallet() {

  document.getElementById("status").innerText =
    "Opening Wallets...";

  const providerOptions = {
    walletconnect: {
      package: window.WalletConnectProvider.default,
      options: {
        rpc: {
          1: "https://mainnet.infura.io/v3/ae8377efd8594d60bec630ac85cc7aa4"
        }
      }
    }
  };

  const web3Modal = new window.Web3Modal.default({
    cacheProvider: false,
    providerOptions
  });

  try {
    const provider = await web3Modal.connect();

    const web3 = new Web3(provider);
    const accounts = await web3.eth.getAccounts();

    const wallet = accounts[0];

    localStorage.setItem("wallet", wallet);

    document.getElementById("status").innerText =
      "Connected: " + wallet;

    setTimeout(() => {
      window.location.href = "home.html";
    }, 1000);

  } catch (error) {
    document.getElementById("status").innerText =
      "Connection Failed";
  }
}
</script>

</body>
</html>
