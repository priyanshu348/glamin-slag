<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag Airdrop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- WalletConnect + Web3 -->
  <script src="https://unpkg.com/@walletconnect/web3-provider/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 50px;
    }

    h1 {
      color: #ff4da6;
    }

    button {
      padding: 12px 20px;
      background: #ff4da6;
      border: none;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      margin-top: 20px;
    }

    #wallet {
      margin-top: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <h1>Glamin Slag Airdrop</h1>
  <p>Connect your wallet to continue</p>

  <button onclick="connectWallet()">Connect Wallet</button>
  <div id="wallet"></div>

  <script>
  async function connectWallet() {

    // MetaMask
    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts',
      });

      document.getElementById("wallet").innerText =
        "Connected: " + accounts[0];
    }

    // WalletConnect (mobile Chrome)
    else {
      const provider = new WalletConnectProvider.default({
        rpc: {
          1: "https://mainnet.infura.io/v3/ae8377efd8594d60bec630ac85cc7aa4"
        }
      });

      await provider.enable();

      const web3 = new Web3(provider);
      const accounts = await web3.eth.getAccounts();

      document.getElementById("wallet").innerText =
        "Connected: " + accounts[0];
    }
  }
  </script>

</body>
</html>
