
<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag Airdrop</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://unpkg.com/@walletconnect/web3-provider/dist/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .box {
      background: #111;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 77, 166, 0.2);
    }

    h1 {
      color: #ff4da6;
    }

    p {
      color: #aaa;
      margin: 10px 0 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ff4da6;
      border: none;
      color: white;
      border-radius: 25px;
      font-size: 16px;
    }

    #wallet {
      margin-top: 15px;
      font-size: 12px;
      color: #00ffcc;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Glamin Slag</h1>
    <p>Airdrop Campaign</p>

    <button onclick="connectWallet()">Connect Wallet</button>

    <div id="wallet"></div>
  </div>

  <script>
  async function connectWallet() {

    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: 'eth_requestAccounts',
      });

      document.getElementById("wallet").innerText =
        "Connected: " + accounts[0];
    } else {
      const provider = new WalletConnectProvider.default({
        rpc: {
          1: "https://mainnet.infura.io/v3/ae8377efd8594d60bec630ac85cc7aa4"
        }
      });

      await provider.enable();

      const web3 = new Web3(provider);
      const accounts = await web3.eth.getAccounts();

      document.getElementById("wallet").innerText =
        "Connected: " + accounts[0];
    }
  }
  </script>

</body>
</html>
