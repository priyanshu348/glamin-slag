<!DOCTYPE html>
<html>
<head>
  <title>Glamin Slag</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      background:#0b0b0b;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:400px;
      background:#121212;
      border:1px solid #2a2a2a;
      border-radius:18px;
      padding:30px;
      box-shadow:0 0 20px rgba(255,193,7,0.08);
    }

    h1{
      text-align:center;
      color:#ffc107;
      margin-bottom:10px;
      font-size:34px;
    }

    .sub{
      text-align:center;
      color:#bbb;
      margin-bottom:25px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:14px;
      border:none;
      border-radius:10px;
      background:#1c1c1c;
      color:white;
      outline:none;
      font-size:15px;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ffc107;
      color:black;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
      margin-top:5px;
    }

    .switch{
      text-align:center;
      margin-top:18px;
      color:#aaa;
      font-size:14px;
    }

    .switch span{
      color:#ffc107;
      font-weight:bold;
      cursor:pointer;
    }

    .hidden{
      display:none;
    }

    #status{
      text-align:center;
      margin-top:15px;
      color:#00ffcc;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="box">

  <!-- SIGN UP PAGE -->
  <div id="signupPage">

    <h1>Glamin Slag</h1>

    <div class="sub">
      Create your secure account
    </div>

    <input
      type="text"
      id="fullName"
      placeholder="Full Name"
    >

    <input
      type="email"
      id="signupEmail"
      placeholder="Email Address"
    >

    <input
      type="password"
      id="signupPassword"
      placeholder="Create Password"
    >

    <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm Password"
    >

    <button onclick="signup()">
      Sign Up
    </button>

    <div class="switch">
      Already have an account?
      <span onclick="showLogin()">Login</span>
    </div>

  </div>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="hidden">

    <h1>Glamin Slag</h1>

    <div class="sub">
      Login to continue
    </div>

    <input
      type="email"
      id="loginEmail"
      placeholder="Email Address"
    >

    <input
      type="password"
      id="loginPassword"
      placeholder="Password"
    >

    <button onclick="login()">
      Login
    </button>

    <div class="switch">
      Don’t have an account?
      <span onclick="showSignup()">Sign Up</span>
    </div>

  </div>

  <div id="status"></div>

</div>

<script>

function showLogin(){
  document.getElementById("signupPage")
    .classList.add("hidden");

  document.getElementById("loginPage")
    .classList.remove("hidden");

  document.getElementById("status")
    .innerText = "";
}

function showSignup(){
  document.getElementById("loginPage")
    .classList.add("hidden");

  document.getElementById("signupPage")
    .classList.remove("hidden");

  document.getElementById("status")
    .innerText = "";
}

function signup(){

  let name =
    document.getElementById("fullName").value;

  let email =
    document.getElementById("signupEmail").value;

  let password =
    document.getElementById("signupPassword").value;

  let confirm =
    document.getElementById("confirmPassword").value;

  if(!name || !email || !password || !confirm){
    document.getElementById("status").innerText =
      "Please fill all fields";
    return;
  }

  if(password !== confirm){
    document.getElementById("status").innerText =
      "Passwords do not match";
    return;
  }

  localStorage.setItem("userName", name);
  localStorage.setItem("userEmail", email);
  localStorage.setItem("userPassword", password);

  document.getElementById("status").innerText =
    "Account created successfully ✅";

  setTimeout(() => {
    showLogin();
  }, 1000);
}

function login(){

  let email =
    document.getElementById("loginEmail").value;

  let password =
    document.getElementById("loginPassword").value;

  let savedEmail =
    localStorage.getItem("userEmail");

  let savedPassword =
    localStorage.getItem("userPassword");

  if(email === savedEmail &&
     password === savedPassword){

    localStorage.setItem(
      "loggedIn",
      "true"
    );

    document.getElementById("status").innerText =
      "Login successful ✅";

    setTimeout(() => {
      window.location.href =
        "home.html";
    }, 1000);

  } else {
    document.getElementById("status").innerText =
      "Invalid email or password";
  }
}

</script>

</body>
</html>
